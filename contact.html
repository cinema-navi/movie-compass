<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | COMPASS</title>
<style>
  :root{
    --bg:#0B0E14; --bg-elevated:#12161F; --gold:#C99A4A;
    --text:#EDE7DA; --text-muted:#8B93A1; --line:rgba(237,231,218,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; padding-bottom:40px; }
  a{ color:var(--gold); }
  header{ display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(11,14,20,0.92); backdrop-filter:blur(8px); }
  .logo{ font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif; font-weight:700; font-size:22px; display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--text); }
  .logo .mark{ width:20px; height:20px; border:1.5px solid var(--gold); border-radius:50%; position:relative; }
  .logo .mark::after{ content:""; position:absolute; top:50%; left:50%; width:2px; height:7px; background:var(--gold); transform:translate(-50%,-100%) rotate(35deg); transform-origin:bottom center; }
  .back-link{ font-size:13px; color:var(--text-muted); text-decoration:none; }
  .back-link:hover{ color:var(--gold); }
  .wrap{ max-width:520px; margin:0 auto; padding:32px 20px; }
  h1{ font-family:Georgia,serif; font-size:24px; margin-bottom:16px; }
  p{ font-size:14px; line-height:1.9; color:var(--text-muted); margin-bottom:24px; }
  .contact-box{
    background:var(--bg-elevated); border:1px solid var(--line); border-radius:12px;
    padding:24px; text-align:center;
  }
  .contact-box .label{ font-size:12px; color:var(--gold); letter-spacing:1px; margin-bottom:10px; }
  .contact-box .email{ font-size:16px; font-weight:600; word-break:break-all; }
  .fill-me{ background:rgba(201,154,74,0.15); padding:1px 4px; border-radius:3px; }
  footer{ padding:32px 20px 10px; text-align:center; color:var(--text-muted); font-size:11px; border-top:1px solid var(--line); margin-top:20px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html"><span class="mark"></span>COMPASS</a>
  <a class="back-link" href="index.html">← 一覧に戻る</a>
</header>

<div class="wrap">
  <h1>お問い合わせ</h1>
  <p>作品情報の誤りのご指摘、その他ご意見・ご要望は、以下のメールアドレスまでご連絡ください。内容を確認の上、順次対応いたします(返信までお時間をいただく場合があります)。</p>

  <div class="contact-box">
    <div class="label">CONTACT</div>
    <div class="email"><a href="mailto:info@example.com" class="fill-me">info@example.com</a></div>
  </div>

  <p style="margin-top:24px; font-size:12px;">※上記メールアドレスは仮のものです。ご自身の連絡用メールアドレスに書き換えてください。</p>
</div>

<footer>
  <a class="logo" href="index.html" style="justify-content:center; font-size:16px;"><span class="mark"></span>COMPASS</a>
</footer>

</body>
</html>
