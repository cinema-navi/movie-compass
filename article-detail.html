<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記事 | COMPASS</title>
<style>
  :root{
    --bg:#0B0E14;
    --bg-elevated:#12161F;
    --bg-card:#171C26;
    --gold:#C99A4A;
    --gold-soft:rgba(201,154,74,0.16);
    --teal:#3E6D6B;
    --text:#EDE7DA;
    --text-muted:#8B93A1;
    --line:rgba(237,231,218,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:40px;
  }
  a{color:inherit; text-decoration:none;}

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:rgba(11,14,20,0.92);
    backdrop-filter:blur(8px);
    z-index:10;
  }
  .logo{
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.5px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .logo .mark{
    width:20px; height:20px;
    border:1.5px solid var(--gold);
    border-radius:50%;
    position:relative;
    flex-shrink:0;
  }
  .logo .mark::after{
    content:"";
    position:absolute;
    top:50%; left:50%;
    width:2px; height:7px;
    background:var(--gold);
    transform:translate(-50%,-100%) rotate(35deg);
    transform-origin:bottom center;
  }
  .back-link{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    color:var(--text-muted);
  }
  .back-link:hover{ color:var(--gold); }

  .article-wrap{
    max-width:640px;
    margin:0 auto;
    padding:28px 20px 0;
  }
  .article-thumb-lg{
    width:100%;
    height:200px;
    border-radius:10px;
    margin-bottom:22px;
    background-size:cover;
    background-position:center;
    border:1px solid var(--line);
  }
  .article-eyebrow{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:11px;
    letter-spacing:1px;
    color:var(--gold);
    margin-bottom:8px;
  }
  .article-title{
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    font-weight:600;
    font-size:25px;
    line-height:1.45;
    margin-bottom:22px;
  }
  .article-body{
    font-size:16px;
    line-height:1.95;
    letter-spacing:0.3px;
    color:rgba(237,231,218,0.88);
    background:var(--bg-elevated);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 24px;
  }
  .article-body p{
    margin-bottom:24px;
  }
  .article-body p:last-child{
    margin-bottom:0;
  }

  .related-box{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px;
    background:var(--bg-elevated);
    border:1px solid rgba(201,154,74,0.35);
    border-radius:12px;
    margin:28px 0;
  }
  .related-box .related-poster{
    width:52px; height:74px;
    border-radius:5px;
    flex-shrink:0;
    background-size:cover;
    background-position:center;
    border:1px solid var(--line);
  }
  .related-box .related-info{ flex:1; min-width:0; }
  .related-box .related-label{
    font-size:10px;
    color:var(--gold);
    letter-spacing:0.5px;
    margin-bottom:4px;
  }
  .related-box .related-title{
    font-size:14px;
    font-weight:600;
  }
  .related-box .related-go{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:11px;
    color:var(--gold);
    flex-shrink:0;
  }

  .article-ad-note{
    text-align:center;
    font-size:10px;
    color:var(--text-muted);
    margin:20px 0 10px;
  }

  .not-found{
    text-align:center;
    padding:80px 20px;
    color:var(--text-muted);
  }
  .not-found a{
    color:var(--gold);
    text-decoration:underline;
  }

  footer{
    padding:32px 20px 10px;
    text-align:center;
    color:var(--text-muted);
    font-size:11px;
    border-top:1px solid var(--line);
    margin-top:20px;
  }
  footer .logo{ justify-content:center; margin-bottom:10px; font-size:16px;}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html"><span class="mark"></span>COMPASS</a>
  <div style="display:flex; align-items:center; gap:14px;">
    <a class="back-link" href="article-list.html">記事一覧</a>
    <a class="back-link" href="index.html">← トップに戻る</a>
  </div>
</header>

<div class="article-wrap" id="articleWrap">
  <p style="color:var(--text-muted);font-size:12px;">読み込み中...</p>
</div>

<footer>
  <a class="logo" href="index.html"><span class="mark"></span>COMPASS</a>
  本サイトはアフィリエイト広告(PR)を利用しています。
  <p style="margin-top:10px;font-size:10px;color:var(--text-muted);">This product uses the <a href="https://www.themoviedb.org/" target="_blank" rel="noopener" style="color:var(--text-muted);text-decoration:underline;">TMDB</a> API but is not endorsed or certified by TMDB.</p>
</footer>

<script src="movie-data.js"></script>
<script src="articles-data.js"></script>
<script>
  function renderRelated(a){
    if (!a.relatedMovie) return '';
    const m = findMovieByTitle(a.relatedMovie);
    if (!m) return '';
    return `
      <a class="related-box" href="movie-detail.html?title=${encodeURIComponent(m.title)}">
        <div class="related-poster" style="${posterStyle(m)}" ${posterAttrs(m)}></div>
        <div class="related-info">
          <div class="related-label">この記事で紹介した作品</div>
          <div class="related-title">${m.title}</div>
        </div>
        <span class="related-go">観る →</span>
      </a>`;
  }

  function renderArticle(a){
    const wrap = document.getElementById('articleWrap');
    const embed = youtubeEmbedHTML(a.youtubeUrl);
    const thumb = embed ? '' : `<div class="article-thumb-lg" style="background:${a.gradient};"></div>`;
    wrap.innerHTML = `
      ${thumb}
      ${embed}
      <div class="article-eyebrow">${a.publishedDate || ''}</div>
      <div class="article-title">${a.title}</div>
      <div class="article-body">${renderArticleBody(a.body)}</div>
      ${renderRelated(a)}
      <div class="article-ad-note">記事内のリンクにはアフィリエイト広告(PR)を含む場合があります</div>
    `;
    document.title = `${a.title} | COMPASS`;
  }

  function renderNotFound(){
    document.getElementById('articleWrap').innerHTML = `
      <div class="not-found">
        指定された記事が見つかりませんでした。<br>
        <a href="article-list.html">記事一覧に戻る</a>
      </div>`;
  }

  async function init(){
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    await loadMovies();
    await loadArticles();
    const article = slug ? findArticleBySlug(slug) : null;
    if (article){
      renderArticle(article);
      hydratePosterImages();
    } else {
      renderNotFound();
    }
  }
  init();
</script>

</body>
</html>
