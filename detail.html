<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品詳細 | COMPASS</title>
<style>
  :root{
    --bg:#0B0E14;
    --bg-elevated:#12161F;
    --bg-card:#171C26;
    --gold:#C99A4A;
    --gold-soft:rgba(201,154,74,0.16);
    --teal:#3E6D6B;
    --text:#EDE7DA;
    --text-muted:#8B93A1;
    --line:rgba(237,231,218,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:40px;
  }
  a{color:inherit; text-decoration:none;}

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:rgba(11,14,20,0.92);
    backdrop-filter:blur(8px);
    z-index:10;
  }
  .logo{
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.5px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .logo .mark{
    width:20px; height:20px;
    border:1.5px solid var(--gold);
    border-radius:50%;
    position:relative;
    flex-shrink:0;
  }
  .logo .mark::after{
    content:"";
    position:absolute;
    top:50%; left:50%;
    width:2px; height:7px;
    background:var(--gold);
    transform:translate(-50%,-100%) rotate(35deg);
    transform-origin:bottom center;
  }
  .back-link{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    color:var(--text-muted);
  }
  .back-link:hover{ color:var(--gold); }

  .detail-wrap{
    max-width:640px;
    margin:0 auto;
    padding:28px 20px 0;
  }

  .detail-poster{
    width:100%;
    height:220px;
    border-radius:10px;
    margin-bottom:20px;
    background-size:cover;
    background-position:center;
    border:1px solid var(--line);
    position:relative;
  }
  .detail-rank{
    position:absolute;
    top:-12px; left:-12px;
    width:38px; height:38px;
    border-radius:50%;
    background:var(--bg);
    border:1.5px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-weight:700;
    font-size:14px;
    color:var(--gold);
  }

  .detail-genre{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:11px;
    letter-spacing:1px;
    color:var(--gold);
    margin-bottom:8px;
  }
  .detail-title{
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    font-weight:600;
    font-size:26px;
    line-height:1.4;
    margin-bottom:10px;
  }
  .detail-meta{
    font-size:13px;
    color:var(--text-muted);
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    margin-bottom:22px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .detail-meta .star{ color:var(--gold); }

  .heart-toggle{
    width:34px; height:34px;
    border-radius:50%;
    background:var(--bg-elevated);
    border:1px solid var(--line);
    color:var(--text-muted);
    font-size:15px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    margin-left:auto;
  }
  .heart-toggle.active{
    color:#E4694A;
    border-color:#E4694A;
  }

  .detail-label{
    font-size:11px;
    color:var(--gold);
    letter-spacing:1px;
    margin-bottom:8px;
  }
  .detail-synopsis{
    font-size:14.5px;
    line-height:1.9;
    color:var(--text);
    margin-bottom:26px;
  }
  .detail-reason{
    background:var(--bg-elevated);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
    font-size:13px;
    line-height:1.8;
    color:var(--text-muted);
    margin-bottom:26px;
  }

  .platform-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:8px;
  }
  .platform-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:13px 16px;
    border-radius:12px;
    background:var(--bg-elevated);
    border:1px solid var(--line);
    color:var(--text);
    font-size:13.5px;
    font-weight:600;
  }
  .platform-btn .go{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:11px;
    color:var(--gold);
  }

  .detail-cta{
    display:block;
    width:100%;
    text-align:center;
    padding:14px;
    border-radius:24px;
    background:var(--gold);
    color:var(--bg);
    font-weight:700;
    font-size:14px;
    margin-bottom:8px;
    margin-top:8px;
  }
  .detail-ad-note{
    text-align:center;
    font-size:10px;
    color:var(--text-muted);
    margin-bottom:30px;
  }

  .not-found{
    text-align:center;
    padding:80px 20px;
    color:var(--text-muted);
  }
  .not-found a{
    color:var(--gold);
    text-decoration:underline;
  }

  footer{
    padding:32px 20px 10px;
    text-align:center;
    color:var(--text-muted);
    font-size:11px;
    border-top:1px solid var(--line);
    margin-top:20px;
  }
  footer .logo{ justify-content:center; margin-bottom:10px; font-size:16px;}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="mark"></span>COMPASS</div>
  <div style="display:flex; align-items:center; gap:14px;">
    <a class="back-link" href="favorites.html">♡ お気に入り</a>
    <a class="back-link" href="index.html">← 一覧に戻る</a>
  </div>
</header>

<div class="detail-wrap" id="detailWrap">
  <p style="color:var(--text-muted);font-size:12px;">読み込み中...</p>
</div>

<footer>
  <div class="logo"><span class="mark"></span>COMPASS</div>
  これはプロトタイプです。実際の作品画像・配信リンクは今後接続します。
</footer>

<script src="movie-data.js"></script>
<script>
  // ---------- お気に入り(localStorageに保存、リロードしても消えない) ----------
  const favorites = loadFavorites();

  function renderPlatforms(platforms){
    if (!platforms || !platforms.length) return '';
    return `
      <div class="detail-label">配信サービス</div>
      <div class="platform-list">
        ${platforms.map(p => `
          <a class="platform-btn" href="${p.url}" target="_blank" rel="nofollow sponsored noopener">
            ${p.name}<span class="go">見る →</span>
          </a>`).join('')}
      </div>`;
  }

  function renderDetail(m){
    const wrap = document.getElementById('detailWrap');
    const isFav = favorites.has(m.title);
    const rankBadge = m.rank ? `<div class="detail-rank">${m.rank}</div>` : '';

    wrap.innerHTML = `
      <div class="detail-poster" style="background:${m.gradient};">${rankBadge}</div>
      <div class="detail-genre">${m.genre}</div>
      <div class="detail-title">${m.title}</div>
      <div class="detail-meta">
        <span><span class="star">★</span> ${m.rating}</span>
        <span>${m.year}</span>
        <button type="button" class="heart-toggle${isFav ? ' active' : ''}" id="heartToggle" aria-label="お気に入りに追加">${isFav ? '♥' : '♡'}</button>
      </div>
      <div class="detail-label">あらすじ</div>
      <div class="detail-synopsis">${m.synopsis || 'あらすじ準備中です。'}</div>
      ${m.reason ? `<div class="detail-reason">${m.reason}</div>` : ''}
      ${renderPlatforms(m.platforms)}
      <a class="detail-cta" href="${amazonSearchUrl(m.title)}" target="_blank" rel="nofollow sponsored noopener">
        ${(m.platforms && m.platforms.length) ? '他の購入先もさがす' : '配信・購入をさがす'}
      </a>
      <div class="detail-ad-note">PR: 上記リンクはアフィリエイト広告を含みます</div>
    `;

    document.getElementById('heartToggle').addEventListener('click', () => {
      const btn = document.getElementById('heartToggle');
      const nowFav = !favorites.has(m.title);
      if (nowFav) favorites.add(m.title); else favorites.delete(m.title);
      btn.classList.toggle('active', nowFav);
      btn.textContent = nowFav ? '♥' : '♡';
      saveFavorites(favorites);
    });
  }

  function renderNotFound(){
    document.getElementById('detailWrap').innerHTML = `
      <div class="not-found">
        指定された作品が見つかりませんでした。<br>
        <a href="index.html">一覧に戻る</a>
      </div>`;
  }

  async function init(){
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    await loadMovies();
    const movie = title ? findMovieByTitle(title) : null;
    if (movie){
      document.title = `${movie.title} | COMPASS`;
      renderDetail(movie);
    } else {
      renderNotFound();
    }
  }
  init();
</script>

</body>
</html>
