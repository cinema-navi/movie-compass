<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPASS | 今夜、何を観るか迷ったら</title>
<style>
  :root{
    --bg:#0B0E14;
    --bg-elevated:#12161F;
    --bg-card:#171C26;
    --gold:#C99A4A;
    --gold-soft:rgba(201,154,74,0.16);
    --teal:#3E6D6B;
    --text:#EDE7DA;
    --text-muted:#8B93A1;
    --line:rgba(237,231,218,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:40px;
  }
  a{color:inherit; text-decoration:none;}

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:rgba(11,14,20,0.92);
    backdrop-filter:blur(8px);
    z-index:10;
  }
  .logo{
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.5px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .logo .mark{
    width:20px; height:20px;
    border:1.5px solid var(--gold);
    border-radius:50%;
    position:relative;
    flex-shrink:0;
  }
  .logo .mark::after{
    content:"";
    position:absolute;
    top:50%; left:50%;
    width:2px; height:7px;
    background:var(--gold);
    transform:translate(-50%,-100%) rotate(35deg);
    transform-origin:bottom center;
  }
  .icon-btn{
    width:36px; height:36px;
    border-radius:50%;
    background:var(--bg-elevated);
    display:flex; align-items:center; justify-content:center;
    font-size:15px;
    color:var(--text-muted);
    border:1px solid var(--line);
    cursor:pointer;
  }

  .search-bar{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.3s ease, padding 0.3s ease;
    background:var(--bg-elevated);
    border-bottom:1px solid var(--line);
  }
  .search-bar.open{
    max-height:60px;
    padding:12px 20px;
  }
  .search-bar input{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:20px;
    padding:9px 16px;
    color:var(--text);
    font-size:13px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  .search-bar input:focus{ outline:1px solid var(--gold); }
  .search-bar input::placeholder{ color:var(--text-muted); }

  .heart-btn{
    position:absolute;
    top:8px; right:8px;
    width:26px; height:26px;
    border-radius:50%;
    background:rgba(11,14,20,0.55);
    border:1px solid rgba(237,231,218,0.25);
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    color:rgba(237,231,218,0.85);
    cursor:pointer;
    z-index:2;
  }
  .heart-btn.active{
    color:#E4694A;
    border-color:#E4694A;
  }
  .result-item .poster-sm{ position:relative; }
  .result-item .heart-btn{
    width:22px; height:22px;
    font-size:11px;
    top:4px; right:4px;
  }

  /* ---------- Hero ---------- */
  .hero{
    padding:36px 20px 28px;
    background:
      radial-gradient(circle at 85% -10%, rgba(201,154,74,0.14), transparent 55%),
      var(--bg);
  }
  .eyebrow{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:11px;
    letter-spacing:2px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .hero h1{
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    font-weight:600;
    font-size:30px;
    line-height:1.35;
    letter-spacing:0.2px;
    margin-bottom:10px;
  }
  .hero p{
    color:var(--text-muted);
    font-size:14px;
    line-height:1.7;
    margin-bottom:24px;
    max-width:480px;
  }

  .mood-label{
    font-size:12px;
    color:var(--text-muted);
    margin-bottom:10px;
  }
  .moods{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:8px;
  }
  .mood-chip{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:13px;
    padding:9px 16px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--bg-elevated);
    color:var(--text);
    cursor:pointer;
    transition:all 0.2s ease;
  }
  .mood-chip.active{
    border-color:var(--gold);
    background:var(--gold-soft);
    color:var(--gold);
  }

  /* ---------- Quiz / Diagnosis ---------- */
  .diagnosis-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:11px;
    letter-spacing:1.5px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:12px;
  }
  .diagnosis-badge .dot{
    width:6px; height:6px;
    border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 8px 2px rgba(201,154,74,0.6);
    flex-shrink:0;
  }
  .quiz{
    background:var(--bg-elevated);
    border:1px solid rgba(201,154,74,0.35);
    border-radius:14px;
    padding:20px;
    max-width:480px;
    box-shadow:0 24px 60px -28px rgba(201,154,74,0.45), 0 0 0 1px rgba(201,154,74,0.08);
  }
  .quiz-progress{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
  }
  .back-btn{
    width:26px; height:26px;
    border-radius:50%;
    border:1px solid var(--line);
    background:transparent;
    color:var(--text-muted);
    font-size:13px;
    display:none;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
  }
  .back-btn:hover{ border-color:var(--gold); color:var(--gold); }
  .back-btn.visible{ display:flex; }
  .needle-dial{
    width:20px; height:20px;
    border:1.5px solid var(--gold);
    border-radius:50%;
    position:relative;
    flex-shrink:0;
  }
  .needle-arrow{
    position:absolute;
    top:50%; left:50%;
    width:2px; height:7px;
    background:var(--gold);
    transform-origin:bottom center;
    transform:translate(-50%,-100%) rotate(-30deg);
    transition:transform 0.45s cubic-bezier(.4,0,.2,1);
  }
  .progress-text{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:11px;
    letter-spacing:1px;
    color:var(--text-muted);
    text-transform:uppercase;
  }
  .quiz-step{ display:none; }
  .quiz-step.active{ display:block; animation:fadeIn 0.35s ease; }
  .q-title{
    font-size:14px;
    color:var(--text);
    margin-bottom:14px;
    line-height:1.6;
  }
  .q-options{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .q-option{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:13px;
    padding:10px 16px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--bg);
    color:var(--text);
    cursor:pointer;
    transition:all 0.2s ease;
  }
  .q-option:hover{ border-color:var(--gold); color:var(--gold); }
  .q-option.selected{
    border-color:var(--gold);
    background:var(--gold-soft);
    color:var(--gold);
  }

  .quiz-result{ display:none; }
  .quiz-result.active{ display:block; animation:fadeIn 0.4s ease; }
  .result-eyebrow{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:10px;
    letter-spacing:2px;
    color:var(--gold);
    margin-bottom:14px;
  }
  .result-list{
    display:flex;
    flex-direction:column;
  }
  .result-item{
    display:flex;
    gap:12px;
    padding:13px 8px;
    margin:0 -8px;
    border-bottom:1px solid var(--line);
    border-radius:8px;
    transition:background 0.2s ease;
  }
  .result-item:hover{
    background:rgba(201,154,74,0.07);
  }
  .result-item:hover .info h4{
    color:var(--gold);
  }
  .result-item:last-child{ border-bottom:none; }
  .result-item .rank{
    width:20px;
    flex-shrink:0;
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-weight:700;
    font-size:13px;
    color:var(--gold);
    padding-top:2px;
  }
  .result-item .poster-sm{
    width:54px; height:76px;
    border-radius:4px;
    flex-shrink:0;
    background-size:cover;
    border:1px solid var(--line);
  }
  .result-item .info h4{
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    font-weight:600;
    font-size:14px;
    margin-bottom:3px;
    line-height:1.4;
    transition:color 0.2s ease;
  }
  .result-item .info .meta{ font-size:11px; }
  .result-item .info .reason{
    font-size:11.5px;
    color:var(--text-muted);
    margin-top:4px;
    line-height:1.65;
  }
  .match-percent{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:11px;
    font-weight:700;
    color:var(--gold);
  }
  .match-tags{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    margin-top:7px;
  }
  .match-tag{
    font-size:10px;
    padding:3px 8px;
    border-radius:10px;
    border:1px solid rgba(201,154,74,0.35);
    color:var(--gold);
    background:rgba(201,154,74,0.08);
  }
  .retry-btn{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:12.5px;
    padding:9px 18px;
    border-radius:20px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--gold);
    cursor:pointer;
  }
  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- Sprocket divider ---------- */
  .sprocket{
    display:flex;
    gap:14px;
    padding:22px 20px;
    overflow:hidden;
  }
  .sprocket span{
    width:5px; height:5px;
    border-radius:50%;
    background:var(--line);
    flex-shrink:0;
  }

  /* ---------- Ranking sections ---------- */
  .section{
    padding:6px 0 30px;
  }
  .section-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:0 20px;
    margin-bottom:16px;
  }
  .section-head h2{
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    font-weight:600;
    font-size:19px;
  }
  .section-head .see-all{
    font-size:12px;
    color:var(--text-muted);
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }

  .rail{
    display:flex;
    gap:16px;
    overflow-x:auto;
    padding:4px 20px 10px;
    scroll-snap-type:x proximity;
  }
  .rail::-webkit-scrollbar{display:none;}

  .card{
    flex:0 0 138px;
    scroll-snap-align:start;
    opacity:1;
    cursor:pointer;
    transition:opacity 0.3s ease;
  }
  .card.dim{ opacity:0.28; }

  .poster{
    width:138px;
    height:194px;
    border-radius:6px;
    position:relative;
    display:flex;
    align-items:flex-end;
    padding:10px;
    background-size:cover;
    background-position:center;
    border:1px solid var(--line);
    transition:transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .card:hover .poster{
    transform:translateY(-5px) scale(1.03);
    border-color:rgba(201,154,74,0.7);
    box-shadow:0 16px 34px -14px rgba(201,154,74,0.55);
  }
  .card:hover h3{ color:var(--gold); }
  .card h3{ transition:color 0.2s ease; }
  .poster .genre-tag{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:9px;
    letter-spacing:0.5px;
    color:rgba(237,231,218,0.75);
    background:rgba(0,0,0,0.35);
    padding:3px 6px;
    border-radius:3px;
  }
  .rank-badge{
    position:absolute;
    top:-10px; left:-10px;
    width:34px; height:34px;
    border-radius:50%;
    background:var(--bg);
    border:1.5px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-weight:700;
    font-size:13px;
    color:var(--gold);
  }
  .rail.no-rank .rank-badge{ display:none; }

  .perforation{
    height:1px;
    margin:10px 0 8px;
    background-image:repeating-linear-gradient(90deg, var(--line) 0 5px, transparent 5px 10px);
  }

  .card h3{
    font-size:13.5px;
    font-weight:600;
    line-height:1.4;
    margin-bottom:4px;
  }
  .meta{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:11.5px;
    color:var(--text-muted);
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  .meta .star{ color:var(--gold); }
  .mood-tags{
    margin-top:6px;
    font-size:10.5px;
    color:var(--text-muted);
  }

  footer{
    padding:32px 20px 10px;
    text-align:center;
    color:var(--text-muted);
    font-size:11px;
    border-top:1px solid var(--line);
    margin-top:20px;
  }
  .disclosure{
    padding:8px 20px;
    background:var(--bg-elevated);
    border-bottom:1px solid var(--line);
    font-size:10.5px;
    color:var(--text-muted);
    text-align:center;
  }
  footer .logo{ justify-content:center; margin-bottom:10px; font-size:16px;}
  .footer-links{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:14px;
    margin-bottom:14px;
  }
  .footer-links a{
    color:var(--text-muted);
    font-size:11px;
    border-bottom:1px solid transparent;
  }
  .footer-links a:hover{ color:var(--gold); border-color:var(--gold); }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="mark"></span>COMPASS</div>
  <div style="display:flex; align-items:center; gap:10px;">
    <a class="icon-btn" href="favorites.html" aria-label="お気に入り一覧" style="text-decoration:none;">♡</a>
    <div class="icon-btn" id="searchToggle">⌕</div>
  </div>
</header>
<div class="search-bar" id="searchBar">
  <input type="text" id="searchInput" placeholder="作品タイトルで探す">
</div>
<div class="disclosure">本サイトはアフィリエイト広告(PR)を利用しています</div>

<section class="hero">
  <div class="eyebrow">FIND YOUR NEXT FILM</div>
  <h1>今夜、何を観るか<br>迷ったら。</h1>
  <p>星の数ではなく、今のあなたの気分から。COMPASSは「なんとなく決められない夜」のための映画案内です。</p>

  <div class="diagnosis-badge"><span class="dot"></span>60秒で、あなたに合う一本を診断</div>
  <div class="quiz">
    <div class="quiz-progress">
      <button class="back-btn" id="backBtn" aria-label="一つ前の質問に戻る">←</button>
      <div class="needle-dial"><div class="needle-arrow" id="needleArrow"></div></div>
      <div class="progress-text" id="progressText">Q1 / 5</div>
    </div>

    <div class="quiz-step active" data-step="1">
      <div class="q-title">今の気分に近いのは?</div>
      <div class="q-options">
        <button class="q-option" data-mood="cry">泣きたい</button>
        <button class="q-option" data-mood="laugh">笑いたい</button>
        <button class="q-option" data-mood="think">考えたい</button>
        <button class="q-option" data-mood="thrill">ドキドキしたい</button>
        <button class="q-option" data-mood="warm">ほっとしたい</button>
        <button class="q-option" data-mood="scary">ゾクゾクしたい</button>
        <button class="q-option" data-mood="energy">元気をもらいたい</button>
        <button class="q-option" data-mood="nostalgic">懐かしさに浸りたい</button>
      </div>
    </div>

    <div class="quiz-step" data-step="2">
      <div class="q-title">今夜はどんな時間にしたい?</div>
      <div class="q-options">
        <button class="q-option" data-pace="light">軽い気持ちで観たい</button>
        <button class="q-option" data-pace="heavy">じっくり向き合いたい</button>
        <button class="q-option" data-pace="any">どちらでもいい</button>
      </div>
    </div>

    <div class="quiz-step" data-step="3">
      <div class="q-title">誰と観る予定?</div>
      <div class="q-options">
        <button class="q-option" data-companion="solo">ひとりで</button>
        <button class="q-option" data-companion="family">家族と</button>
        <button class="q-option" data-companion="partner">友人・パートナーと</button>
      </div>
    </div>

    <div class="quiz-step" data-step="4">
      <div class="q-title">作品の年代は?</div>
      <div class="q-options">
        <button class="q-option" data-era="recent">最近の話題作がいい</button>
        <button class="q-option" data-era="classic">名作・クラシックもOK</button>
        <button class="q-option" data-era="any">こだわらない</button>
      </div>
    </div>

    <div class="quiz-step" data-step="5">
      <div class="q-title">気になるジャンルは?(複数選択可)</div>
      <div class="q-options" id="genreOptions">
        <button class="q-option" data-genre="anime">アニメーション</button>
        <button class="q-option" data-genre="drama">ドラマ</button>
        <button class="q-option" data-genre="sf">SF</button>
        <button class="q-option" data-genre="comedy">コメディ</button>
        <button class="q-option" data-genre="mystery">サスペンス/ミステリー</button>
        <button class="q-option" data-genre="human">ヒューマン</button>
      </div>
      <button class="retry-btn" id="genreNextBtn" style="margin-top:14px;">診断結果を見る</button>
    </div>

    <div class="quiz-result" id="quizResult">
      <div class="result-eyebrow">あなたへのおすすめ 6作品</div>
      <div class="result-list" id="resultList"></div>
      <button class="retry-btn" id="retryBtn">もう一度診断する</button>
    </div>
  </div>
</section>


<div class="sprocket">
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<div id="sectionsContainer"></div>

<footer>
  <div class="logo"><span class="mark"></span>COMPASS</div>
  <div class="footer-links">
    <a href="#">利用規約</a>
    <a href="#">プライバシーポリシー</a>
    <a href="#">お問い合わせ</a>
  </div>
  これはプロトタイプです。実際の作品画像・配信リンクは今後接続します。
</footer>

<script src="movie-data.js"></script>
<script>
  // ---------- セクション(棚)の動的描画 ----------
  function cardHTML(m, rankNum){
    return `
      <div class="card">
        <div class="poster" style="background:${m.gradient};">
          <span class="genre-tag">${m.genre}</span>
          ${rankNum ? `<div class="rank-badge">${rankNum}</div>` : ''}
        </div>
        <div class="perforation"></div>
        <h3>${m.title}</h3>
        <div class="meta"><span class="star">★</span> ${m.rating} · ${m.year}</div>
      </div>`;
  }

  function renderSections(){
    const container = document.getElementById('sectionsContainer');
    container.innerHTML = SECTION_META.map(sec => {
      let items = movieData.filter(m => m.sections.includes(sec.key));
      if (sec.showRank){
        items = items.slice().sort((a, b) => (a.rank||99) - (b.rank||99));
      }
      if (!items.length) return '';
      const cards = items.map((m, i) => cardHTML(m, sec.showRank ? (m.rank || i+1) : null)).join('');
      return `
        <section class="section">
          <div class="section-head">
            <h2>${sec.title}</h2>
            <span class="see-all">ALL →</span>
          </div>
          <div class="rail${sec.showRank ? '' : ' no-rank'}">${cards}</div>
        </section>`;
    }).join('');
  }

  const moodLabels = { cry:"泣きたい", laugh:"笑いたい", think:"考えたい", thrill:"ドキドキしたい",
    warm:"ほっとしたい", scary:"ゾクゾクしたい", energy:"元気をもらいたい", nostalgic:"懐かしさに浸りたい" };
  const paceLabels = { light:"軽い気持ちで", heavy:"じっくり", any:"" };

  const needleArrow = document.getElementById('needleArrow');
  const progressText = document.getElementById('progressText');
  const backBtn = document.getElementById('backBtn');
  const steps = [1,2,3,4,5].map(n => document.querySelector(`.quiz-step[data-step="${n}"]`));
  const resultBox = document.getElementById('quizResult');

  const answers = { mood:null, pace:null, companion:null, era:null, genres:[] };
  const needleDegs = [-45, -22, 0, 22, 45, 90];
  const singleSteps = [
    { step:0, key:'mood', attr:'mood' },
    { step:1, key:'pace', attr:'pace' },
    { step:2, key:'companion', attr:'companion' },
    { step:3, key:'era', attr:'era' },
  ];

  let currentIndex = 0;
  let onResult = false;

  // ---------- Favorites (heart buttons) ----------
  // localStorageに保存されたお気に入りを読み込む(リロードしても消えない)
  const favorites = loadFavorites();

  function injectHeartButtons(){
    document.querySelectorAll('.card .poster').forEach(poster => {
      if (poster.querySelector('.heart-btn')) return;
      const card = poster.closest('.card');
      const title = card.querySelector('h3')?.textContent.trim() || '';
      const isFav = favorites.has(title);
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'heart-btn' + (isFav ? ' active' : '');
      btn.dataset.title = title;
      btn.textContent = isFav ? '♥' : '♡';
      btn.setAttribute('aria-label', 'お気に入りに追加');
      poster.appendChild(btn);
    });
  }

  function setHeartState(title, isFav){
    document.querySelectorAll('.heart-btn').forEach(b => {
      if (b.dataset.title === title){
        b.classList.toggle('active', isFav);
        b.textContent = isFav ? '♥' : '♡';
      }
    });
  }

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.heart-btn');
    if (!btn) return;
    const title = btn.dataset.title;
    const isFav = !favorites.has(title);
    if (isFav) favorites.add(title); else favorites.delete(title);
    setHeartState(title, isFav);
    saveFavorites(favorites);
  });

  // ---------- カードクリック → 詳細ページへ遷移 ----------
  // 以前はここでモーダル(ポップアップ)を開いていましたが、
  // 別ページ(detail.html)に遷移する形に変更しました。
  document.addEventListener('click', (e) => {
    const card = e.target.closest('.rail .card');
    if (!card) return;
    if (e.target.closest('.heart-btn')) return; // ハートボタンは遷移させない
    const title = card.querySelector('h3')?.textContent.trim();
    if (title){
      window.location.href = `detail.html?title=${encodeURIComponent(title)}`;
    }
  });

  // ---------- Search ----------
  const searchToggle = document.getElementById('searchToggle');
  const searchBar = document.getElementById('searchBar');
  const searchInput = document.getElementById('searchInput');

  searchToggle.addEventListener('click', () => {
    searchBar.classList.toggle('open');
    if (searchBar.classList.contains('open')) searchInput.focus();
  });

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    document.querySelectorAll('.rail .card').forEach(card => {
      const title = card.querySelector('h3')?.textContent.toLowerCase() || '';
      card.classList.toggle('dim', q.length > 0 && !title.includes(q));
    });
  });

  function setNeedle(deg){
    needleArrow.style.transform = `translate(-50%,-100%) rotate(${deg}deg)`;
  }

  function refreshSelection(index){
    const entry = singleSteps.find(s => s.step === index);
    if (entry){
      steps[index].querySelectorAll('.q-option').forEach(b => {
        b.classList.toggle('selected', b.dataset[entry.attr] === answers[entry.key]);
      });
    }
    if (index === 4){
      steps[4].querySelectorAll('.q-option').forEach(b => {
        b.classList.toggle('selected', answers.genres.includes(b.dataset.genre));
      });
    }
  }

  function goToStep(index){
    onResult = false;
    resultBox.classList.remove('active');
    steps.forEach(s => s.classList.remove('active'));
    steps[index].classList.add('active');
    currentIndex = index;
    progressText.textContent = `Q${index + 1} / 5`;
    setNeedle(needleDegs[index]);
    backBtn.classList.toggle('visible', index > 0);
    refreshSelection(index);
  }

  backBtn.addEventListener('click', () => {
    if (onResult){
      goToStep(4);
    } else if (currentIndex > 0){
      goToStep(currentIndex - 1);
    }
  });

  // Q1-Q4: single select, auto-advance
  singleSteps.forEach(({step, key, attr}) => {
    steps[step].querySelectorAll('.q-option').forEach(btn => {
      btn.addEventListener('click', () => {
        answers[key] = btn.dataset[attr];
        goToStep(step + 1);
      });
    });
  });

  // Q5: multi-select genres, confirm with button
  document.getElementById('genreOptions').querySelectorAll('.q-option').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('selected');
      const g = btn.dataset.genre;
      if (answers.genres.includes(g)) {
        answers.genres = answers.genres.filter(x => x !== g);
      } else {
        answers.genres.push(g);
      }
    });
  });

  document.getElementById('genreNextBtn').addEventListener('click', showResult);

  // このスコアが取り得る最大値(mood:3 + pace:1 + companion:1 + era:1 + genre:2)
  const MAX_MATCH_SCORE = 8;

  // どの条件が一致したかをタグとして表示するための一覧を作る
  function buildMatchTags(m){
    const tags = [];
    if (answers.mood && m.moods.includes(answers.mood)) tags.push(moodLabels[answers.mood]);
    if (answers.genres.length && answers.genres.includes(m.genreCode)) tags.push(m.genre);
    if (answers.era !== 'any' && m.era === answers.era){
      tags.push(answers.era === 'recent' ? '話題の新作' : '名作・クラシック');
    }
    if (answers.companion && m.companion.includes(answers.companion)){
      const companionLabels = { solo:'ひとり時間に◎', family:'家族での鑑賞に◎', partner:'誰かと観るのに◎' };
      tags.push(companionLabels[answers.companion]);
    }
    return tags;
  }

  function showResult(){
    const scored = movieData.map(m => {
      let score = 0;
      if (m.moods.includes(answers.mood)) score += 3;
      if (answers.pace !== 'any' && m.pace === answers.pace) score += 1;
      if (answers.companion && m.companion.includes(answers.companion)) score += 1;
      if (answers.era !== 'any' && m.era === answers.era) score += 1;
      if (answers.genres.length > 0 && answers.genres.includes(m.genreCode)) score += 2;
      return { movie:m, score };
    });

    scored.sort((a, b) => b.score - a.score || b.movie.rating - a.movie.rating);
    const top = scored.slice(0, 6);

    const listEl = document.getElementById('resultList');
    listEl.innerHTML = top.map((entry, i) => {
      const m = entry.movie;
      const isFav = favorites.has(m.title);
      // 0点でも「合わない」ように見えすぎないよう、60〜99%の範囲に正規化して表示
      const percent = Math.min(99, Math.round(60 + (entry.score / MAX_MATCH_SCORE) * 39));
      const tags = buildMatchTags(m);
      return `
        <div class="result-item" data-title="${m.title}" style="cursor:pointer;">
          <div class="rank">${i + 1}</div>
          <div class="poster-sm" style="background:${m.gradient}">
            <button type="button" class="heart-btn${isFav ? ' active' : ''}" data-title="${m.title}">${isFav ? '♥' : '♡'}</button>
          </div>
          <div class="info">
            <h4>${m.title}</h4>
            <div class="meta"><span class="star">★</span> ${m.rating} · ${m.year} · ${m.genre} · <span class="match-percent">マッチ度 ${percent}%</span></div>
            <div class="reason">${m.reason}</div>
            ${tags.length ? `<div class="match-tags">${tags.map(t => `<span class="match-tag">${t}</span>`).join('')}</div>` : ''}
          </div>
        </div>`;
    }).join('');

    listEl.querySelectorAll('.result-item').forEach(item => {
      item.addEventListener('click', (e) => {
        if (e.target.closest('.heart-btn')) return;
        window.location.href = `detail.html?title=${encodeURIComponent(item.dataset.title)}`;
      });
    });

    steps.forEach(s => s.classList.remove('active'));
    resultBox.classList.add('active');
    progressText.textContent = 'RESULT';
    setNeedle(150);
    onResult = true;
    backBtn.classList.add('visible');
  }

  document.getElementById('retryBtn').addEventListener('click', () => {
    resultBox.classList.remove('active');
    answers.mood = null;
    answers.pace = null;
    answers.companion = null;
    answers.era = null;
    answers.genres = [];
    document.getElementById('genreOptions').querySelectorAll('.q-option').forEach(b => b.classList.remove('selected'));
    goToStep(0);
  });

  // ---------- 起動処理 ----------
  async function init(){
    document.getElementById('sectionsContainer').innerHTML =
      '<p style="padding:20px;color:var(--text-muted);font-size:12px;">読み込み中...</p>';
    await loadMovies();
    renderSections();
    injectHeartButtons();
  }
  init();
</script>


</body>
</html>
